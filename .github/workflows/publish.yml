name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # Required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Checkout the signing library as a sibling directory
      - name: Clone http-message-signatures-ts
        run: |
          git clone https://github.com/REN-100/http-message-signatures-ts.git "$GITHUB_WORKSPACE/../http-message-signatures-ts"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      # Build the signing library first
      - name: Build http-message-signatures-ts
        working-directory: ../http-message-signatures-ts
        run: |
          npm ci
          npm run build

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.js
          test -f dist/index.d.ts
          echo "✅ Build verified"

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
